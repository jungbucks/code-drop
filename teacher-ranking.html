<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏅 오늘의 도전 랭킹 수합기 — 코드 낙하 (교사용)</title>
<style>
/* ==========================================================
   코드 낙하 · 오늘의 도전 랭킹 수합기 (교사용, v1.4)
   학생 제출 결과(복사 텍스트)를 붙여넣으면 순위표를 뽑는다.
   서버 없음 · 브라우저 안에서만 계산 · 외부 요청 0 · 개인정보 비영속
   팔레트: 게임과 동일(TECH_SPEC §6)
   ========================================================== */
:root {
  --bg:#0F172A; --panel:#1E293B; --panel2:#16233c; --ink:#E2E8F0; --dim:#94A3B8;
  --line:#334155; --ok:#4ADE80; --bad:#F87171; --target:#60A5FA; --warn:#FBBF24; --gold:#FBBF24;
  --code:"D2Coding","Cascadia Code",Consolas,monospace;
  --ui:"Malgun Gothic",-apple-system,"Segoe UI",sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--ui); background:var(--bg); color:var(--ink); line-height:1.6; font-size:15.5px; min-height:100vh; }
button:focus-visible, textarea:focus-visible, select:focus-visible { outline:2.5px solid var(--target); outline-offset:2px; }
main { max-width:920px; margin:0 auto; padding:36px 20px 70px; }
h1 { font-size:24px; font-weight:800; }
h1 .g { color:var(--gold); }
.sub { color:var(--dim); font-size:14px; margin-top:6px; }
h2 { font-size:17px; font-weight:800; margin:28px 0 8px; }

.panel { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-top:14px; }
textarea {
  width:100%; height:190px; font-family:var(--code); font-size:12.5px; line-height:1.7;
  background:var(--bg); color:var(--ink); border:1.5px solid var(--line); border-radius:10px; padding:12px; resize:vertical;
}
textarea::placeholder { color:#5a6b85; }
.btn {
  font-family:var(--ui); font-size:15px; font-weight:800; cursor:pointer;
  border:none; border-radius:10px; padding:11px 26px; margin-top:12px;
  background:var(--target); color:#04122e; transition:filter .12s, transform .08s;
}
.btn:hover { filter:brightness(1.08); }
.btn:active { transform:translateY(1px); }
.btn.ghost { background:transparent; color:var(--ink); border:1.5px solid var(--line); }
.btn.ghost:hover { background:var(--panel2); filter:none; }
.msg { font-size:13.5px; font-weight:700; margin-left:12px; color:var(--dim); }

.filters { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-top:14px; }
.filters label { font-size:13.5px; font-weight:700; color:var(--dim); display:flex; align-items:center; gap:6px; }
.filters select {
  font-family:var(--ui); font-size:14px; background:var(--panel); color:var(--ink);
  border:1.5px solid var(--line); border-radius:8px; padding:6px 10px;
}
.filters input[type=checkbox] { width:16px; height:16px; accent-color:var(--gold); }

.summary { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
.stat { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:7px 15px; font-size:13.5px; font-weight:700; color:var(--dim); }
.stat b { color:var(--ink); font-family:var(--code); }

.warn-box { display:none; margin-top:12px; background:#3b2f14; color:var(--warn); border:1px solid var(--warn); border-radius:10px; padding:10px 16px; font-size:14px; font-weight:700; }
.warn-box.show { display:block; }

.tbl-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:12px; margin-top:12px; }
table { border-collapse:collapse; width:100%; min-width:640px; font-size:14px; }
th { background:var(--panel2); color:var(--dim); padding:9px 12px; text-align:left; font-size:12.5px; font-weight:800; white-space:nowrap; position:sticky; top:0; }
td { padding:8px 12px; border-top:1px solid var(--line); white-space:nowrap; }
td.num, th.num { text-align:right; font-family:var(--code); }
tr:hover td { background:var(--panel); }
.rank { font-weight:900; font-family:var(--code); }
.rank.r1 { color:var(--gold); } .rank.r2 { color:#CBD5E1; } .rank.r3 { color:#D97706; }
.gd { display:inline-block; font-family:var(--code); font-weight:800; border-radius:6px; padding:1px 8px; font-size:12.5px; }
.gd-S{background:#3b2f14;color:var(--warn)} .gd-A{background:#153b25;color:var(--ok)} .gd-B{background:#12263f;color:var(--target)} .gd-C{background:#1e293b;color:var(--ink)} .gd-D{background:#1e293b;color:var(--dim)}
.done-y { color:var(--ok); font-weight:800; } .done-n { color:#475569; }
.dup { font-size:12px; color:var(--dim); }

footer { text-align:center; color:#475569; font-size:12.5px; padding:20px; margin-top:20px; }
.hidden { display:none; }
@media (prefers-reduced-motion: reduce){ .btn{transition:none} }
</style>
</head>
<body>
<main>
  <h1>🏅 <span class="g">오늘의 도전</span> 랭킹 수합기 <span style="font-size:13px;color:var(--dim);font-weight:600">· 코드 낙하 · 교사용</span></h1>
  <p class="sub">학생들이 결과 화면에서 복사·제출한 텍스트를 <b>전부 이어 붙여넣고</b> [순위 매기기]를 누르세요. 여러 명 분량을 한꺼번에, 형식이 조금 달라도 자동 인식합니다.</p>

  <div class="panel">
    <textarea id="rawIn" placeholder="[코드 낙하 결과] 🏅오늘의 도전 2026-07-11
학번: 10101 / 이름: 홍길동
난이도: 초급 · 등급: A · 점수: 12,480
정확도: 94.2% · CPM: 182 · 최대 콤보: 12 · 레벨 7 도달 · 완주
일시: 2026-07-11 14:30

(학생 여러 명 분량을 그대로 이어 붙여넣기 — 빈 줄이 있어도 됩니다)"></textarea>
    <div>
      <button class="btn" id="btnRank">🏁 순위 매기기</button>
      <span class="msg" id="parseMsg"></span>
    </div>
  </div>

  <div id="results" class="hidden">
    <div class="filters">
      <label>난이도 <select id="fDiff"></select></label>
      <label>도전 날짜 <select id="fDate"></select></label>
      <label><input type="checkbox" id="fChallenge"> 🏅 도전 제출만</label>
    </div>
    <div class="warn-box" id="warnBox"></div>
    <div class="summary" id="summary"></div>

    <h2>순위표 <span style="font-size:13px;color:var(--dim);font-weight:600">— 학생별 최고 점수 기준</span></h2>
    <div class="tbl-wrap"><table id="rankTable"></table></div>
    <div style="margin-top:12px">
      <button class="btn ghost" id="btnCopy">📋 순위표 복사 (엑셀·한글 붙여넣기)</button>
      <span class="msg" id="copyMsg"></span>
    </div>
  </div>

  <footer>코드 낙하 · 오늘의 도전 랭킹 수합기 · 단일 파일 · 외부 요청 0 · 붙여넣은 데이터는 저장되지 않습니다</footer>
</main>

<script>
'use strict';
let SUBS = [];   // 파싱된 제출 (학생별 최고점 dedupe 전 원본)

/* ── 파싱 ── 각 제출 = "[코드 낙하 결과]"로 시작하는 5줄 블록 ── */
function parse(raw) {
  const lines = raw.split(/\r?\n/);
  const subs = []; let cur = null;
  const push = () => { if (cur && Number.isFinite(cur.score)) subs.push(cur); };
  for (const line of lines) {
    if (line.indexOf('[코드 낙하 결과]') !== -1) {
      push(); cur = { challenge: false, cdate: '' };
      const m = line.match(/오늘의 도전\s*(\d{4}-\d{2}-\d{2})/);
      if (m) { cur.challenge = true; cur.cdate = m[1]; }
      continue;
    }
    if (!cur) continue;
    let m;
    if ((m = line.match(/학번:\s*(.*?)\s*\/\s*이름:\s*(.*)$/))) { cur.sid = m[1].trim(); cur.name = m[2].trim(); }
    else if ((m = line.match(/난이도:\s*([^·]+?)\s*·\s*등급:\s*(\S+)\s*·\s*점수:\s*([\d,]+)/))) {
      cur.diffRaw = m[1].trim();
      cur.hardcore = /하드코어/.test(cur.diffRaw);
      cur.diff = cur.diffRaw.replace(/\s*\(?하드코어\)?/, '').trim();
      cur.grade = m[2].trim();
      cur.score = parseInt(m[3].replace(/,/g, ''), 10);
    }
    else if ((m = line.match(/정확도:\s*([\d.]+)%\s*·\s*CPM:\s*(\d+)\s*·\s*최대 콤보:\s*(\d+)\s*·\s*레벨\s*(\d+)/))) {
      cur.acc = parseFloat(m[1]); cur.cpm = parseInt(m[2], 10);
      cur.combo = parseInt(m[3], 10); cur.level = parseInt(m[4], 10);
      cur.done = /완주/.test(line);
    }
  }
  push();
  return subs;
}

function analyze() {
  SUBS = parse(document.getElementById('rawIn').value);
  const msg = document.getElementById('parseMsg');
  if (!SUBS.length) { msg.textContent = '⚠️ 인식된 제출이 없습니다 — 결과 텍스트 전체를 붙여넣었는지 확인하세요.'; msg.style.color = 'var(--bad)'; document.getElementById('results').classList.add('hidden'); return; }
  msg.textContent = `제출 ${SUBS.length}건 인식`; msg.style.color = 'var(--dim)';
  document.getElementById('results').classList.remove('hidden');
  buildFilters();
  render();
}

function buildFilters() {
  const diffs = [...new Set(SUBS.map(s => s.diff).filter(Boolean))];
  const order = ['비기너', '초급', '중급', '고급'];
  diffs.sort((a, b) => order.indexOf(a) - order.indexOf(b));
  const fd = document.getElementById('fDiff');
  fd.innerHTML = '<option value="">전체</option>' + diffs.map(d => `<option value="${d}">${d}</option>`).join('');
  const dates = [...new Set(SUBS.filter(s => s.cdate).map(s => s.cdate))].sort().reverse();
  const fdate = document.getElementById('fDate');
  fdate.innerHTML = '<option value="">전체</option>' + dates.map(d => `<option value="${d}">${d}</option>`).join('');
  // 도전 제출이 하나라도 있으면 기본으로 도전 필터·최신 날짜 선택(대항전 사용 맥락)
  if (dates.length) { document.getElementById('fChallenge').checked = true; fdate.value = dates[0]; }
}

function esc(s) { return String(s).replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m])); }

let VIEW = [];  // 현재 순위표(복사용)
function render() {
  const fDiff = document.getElementById('fDiff').value;
  const fDate = document.getElementById('fDate').value;
  const onlyCh = document.getElementById('fChallenge').checked;
  // 날짜 필터는 도전 제출에만 적용(비도전 연습 제출은 날짜가 없으므로 도전만 해제 시 항상 포함)
  let rows = SUBS.filter(s =>
    (!fDiff || s.diff === fDiff) && (!fDate || !s.challenge || s.cdate === fDate) && (!onlyCh || s.challenge));

  // 학생별(학번+이름) 최고 점수만 남김 + 시도 횟수 기록
  const byKey = {};
  rows.forEach(s => {
    const key = (s.sid || '?') + '|' + (s.name || '');
    if (!byKey[key] || s.score > byKey[key].score) byKey[key] = Object.assign({ attempts: 0 }, s);
    byKey[key].attempts = (byKey[key].attempts || 0) + 1;
  });
  const ranked = Object.values(byKey).sort((a, b) => b.score - a.score);
  // RANK.EQ 순위(동점 같은 순위)
  ranked.forEach((r, i) => { r.rank = (i > 0 && r.score === ranked[i - 1].score) ? ranked[i - 1].rank : i + 1; });
  VIEW = ranked;

  // 혼합 경고: 서로 다른 난이도가 섞이면 공정 비교 아님
  const diffsInView = [...new Set(ranked.map(r => r.diff))];
  const wb = document.getElementById('warnBox');
  if (diffsInView.length > 1) { wb.textContent = `⚠️ 난이도가 ${diffsInView.length}종 섞여 있습니다(${diffsInView.join(', ')}). 공정한 대항전 순위는 같은 난이도끼리만 비교하세요 — 위 [난이도] 필터를 지정하세요.`; wb.classList.add('show'); }
  else wb.classList.remove('show');

  // 요약
  const n = ranked.length;
  const avg = n ? Math.round(ranked.reduce((s, r) => s + r.score, 0) / n) : 0;
  const avgCpm = n ? Math.round(ranked.reduce((s, r) => s + (r.cpm || 0), 0) / n) : 0;
  const doneN = ranked.filter(r => r.done).length;
  document.getElementById('summary').innerHTML =
    `<span class="stat">참가 <b>${n}</b>명</span>` +
    `<span class="stat">평균 점수 <b>${avg.toLocaleString()}</b></span>` +
    `<span class="stat">평균 CPM <b>${avgCpm}</b></span>` +
    `<span class="stat">완주 <b>${doneN}</b>명 (${n ? Math.round(doneN / n * 100) : 0}%)</span>` +
    (VIEW[0] ? `<span class="stat">최고점 <b>${VIEW[0].score.toLocaleString()}</b> (${esc(VIEW[0].name || VIEW[0].sid || '?')})</span>` : '');

  // 표
  const medal = r => r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : '';
  document.getElementById('rankTable').innerHTML =
    '<tr><th class="num">순위</th><th>학번</th><th>이름</th><th class="num">점수</th><th>등급</th><th class="num">정확도</th><th class="num">CPM</th><th class="num">콤보</th><th>완주</th><th>난이도</th></tr>' +
    ranked.map(r =>
      `<tr><td class="num rank r${r.rank <= 3 ? r.rank : ''}">${medal(r.rank)}${r.rank}</td>` +
      `<td>${esc(r.sid || '-')}</td><td>${esc(r.name || '-')}${r.attempts > 1 ? ` <span class="dup">(${r.attempts}회)</span>` : ''}</td>` +
      `<td class="num">${r.score.toLocaleString()}</td>` +
      `<td><span class="gd gd-${r.grade}">${esc(r.grade)}</span></td>` +
      `<td class="num">${r.acc != null ? r.acc + '%' : '-'}</td><td class="num">${r.cpm ?? '-'}</td><td class="num">×${r.combo ?? '-'}</td>` +
      `<td>${r.done ? '<span class="done-y">✓ 완주</span>' : '<span class="done-n">–</span>'}</td>` +
      `<td>${esc(r.diff || '-')}${r.hardcore ? ' 🔥' : ''}</td></tr>`
    ).join('');
}

['fDiff', 'fDate', 'fChallenge'].forEach(id => document.getElementById(id).addEventListener('change', render));
document.getElementById('btnRank').addEventListener('click', analyze);

/* ── 순위표 TSV 복사 ── */
document.getElementById('btnCopy').addEventListener('click', () => {
  const head = ['순위', '학번', '이름', '점수', '등급', '정확도(%)', 'CPM', '최대콤보', '완주', '난이도', '시도횟수'];
  const body = VIEW.map(r => [r.rank, r.sid || '', r.name || '', r.score, r.grade, r.acc ?? '', r.cpm ?? '', r.combo ?? '', r.done ? '완주' : '', r.diff + (r.hardcore ? '(하드코어)' : ''), r.attempts]);
  const tsv = [head, ...body].map(row => row.join('\t')).join('\n');
  const m = document.getElementById('copyMsg');
  const done = ok => { m.textContent = ok ? '✅ 복사됨 — 엑셀/한글에 붙여넣기' : '❌ 복사 실패'; m.style.color = ok ? 'var(--ok)' : 'var(--bad)'; setTimeout(() => m.textContent = '', 2200); };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(tsv).then(() => done(true), () => done(fb(tsv)));
  else done(fb(tsv));
  function fb(t) { const ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select(); let ok = false; try { ok = document.execCommand('copy'); } catch (e) {} ta.remove(); return ok; }
});
</script>
</body>
</html>
